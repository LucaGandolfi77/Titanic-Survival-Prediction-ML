<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cocktail Slots">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23c026d3' width='100' height='100'/%3E%3Ctext x='50' y='65' text-anchor='middle' font-size='60' fill='white'%3E🍹%3C/text%3E%3C/svg%3E">
    <title>Cocktail Slots Bar</title>
    <style>
        :root {
            --color-bg-base: #1a0a2e;
            --color-bg-elevated: #16213e;
            --color-bg-card: #0f3460;
            --color-primary: #e94560;
            --color-secondary: #f39c12;
            --color-success: #2ecc71;
            --color-text: #f1f5f9;
            --color-text-dim: #94a3b8;
            --color-glow: #ff6b9d;
            --slot-size: 90px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--color-bg-base) 0%, #2d1b4e 100%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(233, 69, 96, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(243, 156, 18, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-secondary);
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }

        .slot-machine {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2) 0%, rgba(243, 156, 18, 0.1) 100%);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out 0.4s both;
            position: relative;
            overflow: hidden;
        }

        .slot-machine::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: shine 3s infinite;
        }

        .reels-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
        }

        .reel {
            width: var(--slot-size);
            height: calc(var(--slot-size) * 3);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .reel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            z-index: 2;
            pointer-events: none;
        }

        .reel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            z-index: 2;
            pointer-events: none;
        }

        .reel-inner {
            position: absolute;
            width: 100%;
            top: 0;
            transition: none;
        }

        .reel-inner.spinning {
            animation: spin 0.1s linear infinite;
        }

        .symbol {
            width: var(--slot-size);
            height: var(--slot-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        .symbol.winning {
            animation: pulse 0.5s ease-in-out infinite alternate;
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px currentColor);
        }

        .payline {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
            opacity: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
        }

        .payline.active {
            animation: paylineGlow 1s ease-in-out infinite;
        }

        .win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.6);
            z-index: 10;
            opacity: 0;
        }

        .win-message.show {
            animation: winPopup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .bet-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .bet-btn:active {
            transform: scale(0.95);
        }

        .bet-display {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
            text-align: center;
        }

        .bet-label {
            font-size: 0.7rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .bet-amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-secondary);
        }

        .spin-btn {
            width: 100%;
            height: 70px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--color-primary), #c026d3);
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            position: relative;
            overflow: hidden;
        }

        .spin-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .spin-btn:hover::before {
            left: 100%;
        }

        .spin-btn:active {
            transform: scale(0.98);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .paytable {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .paytable-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
            color: var(--color-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .paytable-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .paytable-symbols {
            font-size: 1.8rem;
            letter-spacing: 5px;
        }

        .paytable-payout {
            font-weight: 700;
            color: var(--color-success);
            font-size: 1.1rem;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            opacity: 0;
        }

        @keyframes spin {
            from { transform: translateY(0); }
            to { transform: translateY(-100%); }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        @keyframes winPopup {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @keyframes paylineGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes particleFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 400px) {
            :root {
                --slot-size: 75px;
            }
            .logo {
                font-size: 2rem;
            }
            .symbol {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <h1 class="logo">🍹 Cocktail Slots</h1>
            <p class="tagline">Bar Edition</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-label">Credits</div>
                <div class="stat-value" id="credits">1000</div>
            </div>
            <div class="stat">
                <div class="stat-label">Wins</div>
                <div class="stat-value" id="totalWins">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best Win</div>
                <div class="stat-value" id="bestWin">0</div>
            </div>
        </div>

        <div class="slot-machine">
            <div class="reels-container">
                <div class="payline" id="payline"></div>
                <div class="reel">
                    <div class="reel-inner" id="reel1"></div>
                </div>
                <div class="reel">
                    <div class="reel-inner" id="reel2"></div>
                </div>
                <div class="reel">
                    <div class="reel-inner" id="reel3"></div>
                </div>
                <div class="win-message" id="winMessage"></div>
            </div>

            <div class="controls">
                <div class="bet-controls">
                    <button class="bet-btn" id="betDown" aria-label="Decrease bet">−</button>
                    <div class="bet-display">
                        <div class="bet-label">Bet</div>
                        <div class="bet-amount" id="betAmount">10</div>
                    </div>
                    <button class="bet-btn" id="betUp" aria-label="Increase bet">+</button>
                </div>
                <button class="spin-btn" id="spinBtn">
                    <span id="spinText">Spin</span>
                </button>
            </div>
        </div>

        <div class="paytable">
            <h3 class="paytable-title">💎 Paytable</h3>
            <div class="paytable-row">
                <div class="paytable-symbols">🍹 🍹 🍹</div>
                <div class="paytable-payout">×100</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🍸 🍸 🍸</div>
                <div class="paytable-payout">×50</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🍷 🍷 🍷</div>
                <div class="paytable-payout">×30</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🍺 🍺 🍺</div>
                <div class="paytable-payout">×20</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🥃 🥃 🥃</div>
                <div class="paytable-payout">×15</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🍋 🍋 🍋</div>
                <div class="paytable-payout">×10</div>
            </div>
            <div class="paytable-row">
                <div class="paytable-symbols">🍊 🍊 🍊</div>
                <div class="paytable-payout">×8</div>
            </div>
        </div>
    </div>

    <script>
        const symbols = ['🍹', '🍸', '🍷', '🍺', '🥃', '🍋', '🍊'];
        const payouts = {
            '🍹': 100,
            '🍸': 50,
            '🍷': 30,
            '🍺': 20,
            '🥃': 15,
            '🍋': 10,
            '🍊': 8
        };

        let credits = 1000;
        let bet = 10;
        let totalWins = 0;
        let bestWin = 0;
        let spinning = false;

        const betAmounts = [5, 10, 20, 50, 100];
        let currentBetIndex = 1;

        const creditsEl = document.getElementById('credits');
        const betAmountEl = document.getElementById('betAmount');
        const totalWinsEl = document.getElementById('totalWins');
        const bestWinEl = document.getElementById('bestWin');
        const spinBtn = document.getElementById('spinBtn');
        const betUpBtn = document.getElementById('betUp');
        const betDownBtn = document.getElementById('betDown');
        const winMessage = document.getElementById('winMessage');
        const payline = document.getElementById('payline');

        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];

        function initReels() {
            reels.forEach(reel => {
                let symbolsHTML = '';
                for (let i = 0; i < 20; i++) {
                    const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                    symbolsHTML += `<div class="symbol">${randomSymbol}</div>`;
                }
                reel.innerHTML = symbolsHTML;
            });
        }

        function updateUI() {
            creditsEl.textContent = credits;
            betAmountEl.textContent = bet;
            totalWinsEl.textContent = totalWins;
            bestWinEl.textContent = bestWin;
        }

        function createParticles(amount) {
            const particlesContainer = document.getElementById('particles');
            const colors = ['#e94560', '#f39c12', '#2ecc71', '#3498db', '#9b59b6'];
            
            for (let i = 0; i < amount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '-20px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animation = `particleFall ${2 + Math.random() * 2}s linear forwards`;
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 4000);
            }
        }

        function showWinMessage(amount) {
            winMessage.textContent = `WIN ${amount}!`;
            winMessage.classList.add('show');
            payline.classList.add('active');
            
            setTimeout(() => {
                winMessage.classList.remove('show');
                payline.classList.remove('active');
            }, 2000);
        }

        function getVisibleSymbols(reel) {
            const reelRect = reel.parentElement.getBoundingClientRect();
            const symbols = Array.from(reel.children);
            const centerY = reelRect.top + reelRect.height / 2;
            
            let closestSymbol = symbols[0];
            let minDistance = Infinity;
            
            symbols.forEach(symbol => {
                const symbolRect = symbol.getBoundingClientRect();
                const symbolCenterY = symbolRect.top + symbolRect.height / 2;
                const distance = Math.abs(symbolCenterY - centerY);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    closestSymbol = symbol;
                }
            });
            
            return closestSymbol.textContent;
        }

        async function spin() {
            if (spinning || credits < bet) return;
            
            spinning = true;
            credits -= bet;
            updateUI();
            spinBtn.disabled = true;
            
            reels.forEach(reel => {
                reel.querySelectorAll('.symbol').forEach(s => s.classList.remove('winning'));
            });

            const spinDurations = [2000, 2500, 3000];
            const promises = reels.map((reel, index) => {
                return new Promise(resolve => {
                    reel.classList.add('spinning');
                    
                    let symbolsHTML = '';
                    for (let i = 0; i < 30; i++) {
                        const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                        symbolsHTML += `<div class="symbol">${randomSymbol}</div>`;
                    }
                    reel.innerHTML = symbolsHTML;
                    
                    setTimeout(() => {
                        reel.classList.remove('spinning');
                        const targetOffset = -((Math.floor(Math.random() * 10) + 10) * 90);
                        reel.style.transform = `translateY(${targetOffset}px)`;
                        
                        setTimeout(() => {
                            reel.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                            const finalOffset = targetOffset % -2700;
                            reel.style.transform = `translateY(${finalOffset}px)`;
                            
                            setTimeout(() => {
                                reel.style.transition = 'none';
                                resolve();
                            }, 300);
                        }, 50);
                    }, spinDurations[index]);
                });
            });

            await Promise.all(promises);

            const result = reels.map(reel => getVisibleSymbols(reel));
            
            if (result[0] === result[1] && result[1] === result[2]) {
                const winAmount = bet * payouts[result[0]];
                credits += winAmount;
                totalWins += winAmount;
                if (winAmount > bestWin) {
                    bestWin = winAmount;
                }
                
                reels.forEach(reel => {
                    const symbols = Array.from(reel.children);
                    const reelRect = reel.parentElement.getBoundingClientRect();
                    const centerY = reelRect.top + reelRect.height / 2;
                    
                    let closestSymbol = symbols[0];
                    let minDistance = Infinity;
                    
                    symbols.forEach(symbol => {
                        const symbolRect = symbol.getBoundingClientRect();
                        const symbolCenterY = symbolRect.top + symbolRect.height / 2;
                        const distance = Math.abs(symbolCenterY - centerY);
                        
                        if (distance < minDistance) {
                            minDistance = distance;
                            closestSymbol = symbol;
                        }
                    });
                    
                    closestSymbol.classList.add('winning');
                });
                
                showWinMessage(winAmount);
                createParticles(50);
                
                navigator.vibrate && navigator.vibrate([100, 50, 100]);
            }
            
            updateUI();
            spinning = false;
            spinBtn.disabled = false;
        }

        betUpBtn.addEventListener('click', () => {
            if (currentBetIndex < betAmounts.length - 1) {
                currentBetIndex++;
                bet = betAmounts[currentBetIndex];
                updateUI();
            }
        });

        betDownBtn.addEventListener('click', () => {
            if (currentBetIndex > 0) {
                currentBetIndex--;
                bet = betAmounts[currentBetIndex];
                updateUI();
            }
        });

        spinBtn.addEventListener('click', spin);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !spinning) {
                e.preventDefault();
                spin();
            }
        });

        initReels();
        updateUI();
    </script>
</body>
</html>

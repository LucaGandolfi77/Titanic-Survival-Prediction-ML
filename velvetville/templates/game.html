<!DOCTYPE html><html lang="en"><head>    <title>Velvetville Online ??</title>    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>    <style>        body { background: #1a1a2e; color: #fff; font-family: 'Comic Sans MS', cursive, sans-serif; display: flex; }        #game-container { flex: 2; height: 100vh; position: relative; }        #ui-panel { flex: 1; background: #16213e; padding: 20px; border-left: 5px solid #e94560; display: flex; flex-direction: column; }        .glowing-text { text-shadow: 0 0 10px #e94560; }        #chat-box { flex: 1; overflow-y: auto; background: #0f3460; padding: 10px; border-radius: 10px; margin-bottom: 10px; }        .msg { margin: 5px 0; animation: popIn 0.3s ease-out; }        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }        input, button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; }        button { background: #e94560; color: white; cursor: pointer; transition: 0.2s; }        button:hover { transform: scale(1.1); rotate: -2deg; }    </style></head><body>    <div id="game-container">        <!-- Three.js will inject the canvas here -->        <h2 style="position: absolute; top: 10px; left: 10px;" class="glowing-text">            Event: {{ event.name }} (Bonus: x{{ event.multiplier }})        </h2>    </div>        <div id="ui-panel">        <h1 class="glowing-text">?? Leaderboard</h1>        <ul id="leaderboard-list"></ul>        <h1 class="glowing-text">?? Gossip Room</h1>        <div id="chat-box"></div>        <div style="display: flex; gap: 5px;">            <input type="text" id="chat-input" placeholder="Type something sassy..." style="flex: 1;">            <button onclick="sendMessage()">Send ??</button>        </div>    </div>    <script src="{{ url_for('static', filename='game.js') }}"></script></body></html>

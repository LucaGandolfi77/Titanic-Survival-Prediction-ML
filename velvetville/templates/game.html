<!DOCTYPE html>
<html lang="en">
<head>
    <title>Velvetville Online ??</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: 'Comic Sans MS', cursive, sans-serif; display: flex; }
        #game-container { flex: 2; height: 100vh; position: relative; }
        #ui-panel { flex: 1; background: #16213e; padding: 20px; border-left: 5px solid #e94560; display: flex; flex-direction: column; }
        .glowing-text { text-shadow: 0 0 10px #e94560; }
        #chat-box { flex: 1; overflow-y: auto; background: #0f3460; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg { margin: 5px 0; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        input, button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; }
        button { background: #e94560; color: white; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.1); rotate: -2deg; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Three.js will inject the canvas here -->
        <h2 style="position: absolute; top: 10px; left: 10px;" class="glowing-text">
            Event: {{ event.name }} (Bonus: x{{ event.multiplier }})
        </h2>
    </div>
    
    <div id="ui-panel">
        <h1 class="glowing-text">?? Leaderboard</h1>
        <ul id="leaderboard-list"></ul>

        <!-- Voting Booth Snippet -->
        <div id="voting-booth" style="background: #e94560; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);">
            <h2 class="glowing-text" style="margin-top: 0;">👠 The Runway</h2>
            <p>Judging: <b id="target-model" style="font-size: 1.2em;">Nobody</b></p>
            <p>Wearing: <i id="target-outfit">Nothing</i></p>
            
            <input type="range" id="score-slider" min="1" max="10" value="5" 
                   oninput="document.getElementById('score-display').innerText = this.value"
                   style="width: 100%; margin: 10px 0;">
                   
            <div style="font-size: 1.5em; font-weight: bold; margin-bottom: 10px;">
                <span id="score-display">5</span>/10
            </div>
            
            <button onclick="submitVote()" style="background: #1a1a2e; width: 45%;">Slay/Nay? 💅</button>
            <button onclick="nextModel()" style="background: #0f3460; width: 45%;">Skip ⏭️</button>
            
            <div id="vote-feedback" style="margin-top: 10px; font-weight: bold; height: 20px;"></div>
        </div>
        <!-- End Voting Booth Snippet -->

        <h1 class="glowing-text">?? Gossip Room</h1>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chat-input" placeholder="Type something sassy..." style="flex: 1;">
            <button onclick="sendMessage()">Send ??</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>

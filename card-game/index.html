<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardForge — Deck Builder &amp; Card Game</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheets (order matters) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/deck-builder.css">
  <link rel="stylesheet" href="css/game-table.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="app-header">
    <div class="logo">
      <span class="logo__icon">♠</span>
      <h1 class="logo__text">CardForge</h1>
    </div>
    <nav class="nav">
      <a href="#deck" class="nav__link active" data-nav="deck">Deck Builder</a>
      <a href="#game" class="nav__link" data-nav="game">Game Table</a>
    </nav>
  </header>

  <!-- ═══════════ DECK BUILDER ═══════════ -->
  <section id="section-deck" class="app-section active">

    <div class="deck-builder">

      <!-- Filter sidebar -->
      <aside class="filter-panel">
        <h2 class="filter-panel__title">Filters</h2>
        <div class="search-wrap">
          <input type="text" id="card-search" class="search-input" placeholder="Search cards…" autocomplete="off">
        </div>
        <div id="filter-groups" class="filter-groups"></div>
        <button id="reset-filters" class="btn btn-small">Reset Filters</button>
        <p id="result-count" class="result-count">50 cards</p>
      </aside>

      <!-- Card grid -->
      <main class="card-collection">
        <div id="card-grid" class="card-grid"></div>
      </main>

      <!-- Thumbnails preview -->
      <section class="assets-preview">
        <h2>Available Thumbnails (thumbs / mini)</h2>
        <div id="assets-gallery" class="assets-gallery"></div>
      </section>

      <!-- Deck panel -->
      <aside class="deck-panel">
        <div class="deck-panel__header">
          <input type="text" id="deck-name-input" class="deck-name-input" value="My Deck" maxlength="30">
          <span id="deck-count" class="deck-count">0 / 60</span>
        </div>
        <div id="deck-card-list" class="deck-card-list"></div>
        <div class="deck-panel__actions">
          <button id="save-deck-btn" class="btn btn-small">Save</button>
          <button id="clear-deck-btn" class="btn btn-small btn-danger">Clear</button>
          <button id="play-btn" class="btn btn-primary" disabled>Play ▶</button>
        </div>
      </aside>

    </div>
  </section>

  <!-- ═══════════ GAME TABLE ═══════════ -->
  <section id="section-game" class="app-section">

    <div class="game-table">

      <!-- Top bar: stats + controls -->
      <div class="game-header">
        <div class="game-stats">
          <span>Hand: <strong id="hand-count">0</strong></span>
          <span>Played: <strong id="played-count">0</strong></span>
        </div>
        <div class="game-controls">
          <button id="draw-btn" class="btn btn-primary btn-small">Draw 1</button>
          <button id="draw3-btn" class="btn btn-small">Draw 3</button>
          <button id="shuffle-btn" class="btn btn-small">Shuffle ♻</button>
          <button id="clear-table-btn" class="btn btn-small btn-danger">Clear Table</button>
          <button id="new-game-btn" class="btn btn-small">New Game</button>
          <button id="end-game-btn" class="btn btn-small btn-danger">End Game</button>
        </div>
      </div>

      <!-- Piles row -->
      <div class="piles-row">
        <div class="pile" id="draw-pile">
          <div class="pile__visual card card--back card--small"></div>
          <span class="pile__label">Draw</span>
          <span class="pile__count">0</span>
        </div>
        <div class="pile" id="discard-pile">
          <div class="pile__visual pile__visual--empty"></div>
          <span class="pile__label">Discard</span>
          <span class="pile__count">0</span>
        </div>
      </div>

      <!-- Play zone -->
      <div id="play-zone" class="play-zone">
        <p class="play-zone__hint">Drag cards here to play them</p>
      </div>

      <!-- Hand area -->
      <div id="hand-area" class="hand-area"></div>

    </div>
  </section>

  <!-- ═══════════ MODAL ═══════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close" aria-label="Close modal">&times;</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════ TOAST CONTAINER ═══════════ -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ═══════════ CONTEXT MENU ═══════════ -->
  <div id="context-menu" class="context-menu hidden"></div>

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer class="app-footer">
    <div class="footer-section" id="footer-deck">
      <h3>Deck</h3>
      <nav class="footer-nav">
        <a href="#deck" data-nav="deck" class="btn btn-small">Apri Deck Builder</a>
        <button id="footer-save-deck" class="btn btn-small">Salva Deck</button>
      </nav>
    </div>
    <div class="footer-section" id="footer-game">
      <h3>Game</h3>
      <nav class="footer-nav">
        <a href="#game" data-nav="game" class="btn btn-small">Apri Game Table</a>
        <button id="footer-start-game" class="btn btn-small btn-primary">Avvia Partita</button>
      </nav>
    </div>
  </footer>

  <!-- ═══════════ ENTRY POINT ═══════════ -->
  <script type="module" src="js/main.js"></script>

  <!-- Thumbnails loader: probe thumbs/ and mini/ and render found images -->
  <script>
    (function () {
      const gallery = document.getElementById('assets-gallery');
      if (!gallery) return;

      const pad = (n) => String(n).padStart(4, '0');

      const probe = async (url) => {
        try {
          const res = await fetch(url, { method: 'HEAD' });
          return res && res.ok;
        } catch (e) {
          return false;
        }
      };

      const addImage = (src) => {
        const t = document.createElement('div');
        t.className = 'assets-gallery__tile';
        const img = document.createElement('img');
        img.src = src;
        img.alt = src.split('/').pop();
        img.loading = 'lazy';
        t.appendChild(img);
        gallery.appendChild(t);
      };

      const scan = async () => {
        // common patterns observed in assets/cards
        const candidates = [];
        // a1_0001 .. a1_0156
        for (let i = 1; i <= 156; i++) candidates.push(`a1_${pad(i)}.jpg`);
        // a_0002 .. a_0156 and a_0002_1 .. a_0156_1
        for (let i = 2; i <= 156; i++) {
          candidates.push(`a_${pad(i)}.jpg`);
          candidates.push(`a_${pad(i)}_1.jpg`);
        }
        // page_0002 .. page_0155
        for (let i = 2; i <= 155; i++) candidates.push(`page_${pad(i)}.jpg`);

        const baseThumb = 'assets/cards/thumbs/';
        const baseMini = 'assets/cards/mini/';

        for (const name of candidates) {
          const tUrl = baseThumb + name;
          // probe thumb first
          // eslint-disable-next-line no-await-in-loop
          if (await probe(tUrl)) {
            addImage(tUrl);
            continue;
          }
          const mUrl = baseMini + name;
          // eslint-disable-next-line no-await-in-loop
          if (await probe(mUrl)) addImage(mUrl);
        }
      };

      // Kick off after DOM ready
      document.addEventListener('DOMContentLoaded', scan);
    }());
  </script>

</body>
</html>
